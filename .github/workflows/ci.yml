name: Automated Linux Backup and Recovery System CI Pipeline


on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-scripts:
    runs-on: ubantu-24.04
    steps:

    - name: Checkout Automated Linux Backup and Recovery System Code
      uses: actions/checkout@v4

    - name: Give exetute Permissions
      run: |
        chmod +x backup.sh
        chmod +x restore.sh
    - name: Check backup.sh syntax
      run: bash -n backup.sh
    - name: Check restore.sh syntax
      run: bash -n restore.sh
    - name: Run backup script
      run: ./backup.sh
    - name: Run restore.sh
      run: ./restore.sh

    - name: Show Logs
      run: cat log/backup.log

