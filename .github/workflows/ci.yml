name: Automated Linux Backup and Recovery System

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
      

jobs:
  backup_test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Make Script Executable
        run: chmod +x backup.sh
      - name: Create folders
        run: mkdir -p files
             echo "This is a test file" > files/file1.txt
             mkdir -p backup
             mkdir -p logs
      - name: Create config file for CLI
        run: cat > config.conf << EOF
             SOURCE_DIR="./test_source"
             DESTINATION_DIR="./backup"
             LOG_DIR="./logs"
             LOG_FILE="./logs/backup.log"
             RETENTION_DAYS=7
             EOF
      - name: Run backup script
        run: ./backup.sh    
      - name: Verify Backup Created
        run: ls -l backup/
      - name: Check log file
        run: cat logs/backup.log
       
